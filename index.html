<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Lista de Tarefas</title>
</head>
<body>
    <main>
        <h1>Tarefas de hoje</h1>
        <div class="container-tarefas">
            <form id="form-tarefas">
                <label for="input-tarefa">Nova tarefa</label>
                <input type="text" id="input-tarefa" 
                name="tarefa" placeholder="Digite a sua tarefa...">
                <button type="submit">Adicionar</button>
            </form>
            <p id="contador"></p>
            <ul id="lista-tarefas"></ul>
        </div>
    </main>
    <footer>
        <p>© 2026 Bianca Trindade Lima. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
